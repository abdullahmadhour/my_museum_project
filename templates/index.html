<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متحف الحضارة المصرية - حجز التذاكر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-dark: #b8962e;
            --royal-blue: #0a192f;
            --sand: #f4f1ea;
            --white: #ffffff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--sand);
            margin: 0;
            color: var(--royal-blue);
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1503177119275-0aa32b3a9368?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--gold);
            text-align: center;
            border-bottom: 5px solid var(--gold);
        }

        header h1 { font-size: 3rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        header p { font-size: 1.2rem; color: #fff; }

        .container { max-width: 1100px; margin: -50px auto 50px; padding: 20px; }

        .artifacts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .artifact-card {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
            border-bottom: 4px solid var(--gold);
        }

        .artifact-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(212,175,55,0.3); }
        .artifact-img { width: 100%; height: 200px; object-fit: cover; }
        .artifact-info { padding: 20px; text-align: center; }
        .artifact-info h3 { margin: 0 0 10px; color: var(--gold-dark); }

        .booking-section {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 2px solid var(--gold);
        }

        .booking-section h2 { text-align: center; color: var(--royal-blue); margin-bottom: 30px; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-weight: bold; }
        
        input, select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
        }

        .price-tag {
            background: var(--sand);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--gold-dark);
            border: 1px dashed var(--gold);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--royal-blue);
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-submit:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>

<header>
    <h1>متحف الآثار المصرية</h1>
    <p>بوابة عبر الزمن لاكتشاف أسرار الفراعنة</p>
</header>

<div class="container">
    <div class="artifacts-grid">
        {% for item in artifacts %}
        <div class="artifact-card">
            <img src="/static/{{ item.image }}" alt="{{ item.name }}" class="artifact-img">
            <div class="artifact-info">
                <h3>{{ item.name }}</h3>
                <p>{{ item.desc }}</p>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="booking-section">
        <h2>🏛️ احجز تذكرتك الآن</h2>
        <form action="/book" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label>الاسم الكامل:</label>
                    <input type="text" name="full_name" required placeholder="أدخل اسمك الثلاثي">
                </div>
                <div class="form-group">
                    <label>نوع التذكرة:</label>
                    <select name="ticket_type" id="ticketType" onchange="calculatePrice()" required>
                        <option value="egyptian">مصري (60 ج.م)</option>
                        <option value="foreign">أجنبي (200 ج.م)</option>
                        <option value="student">طالب (30 ج.م)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>عدد التذاكر:</label>
                    <input type="number" name="ticket_count" id="ticketCount" min="1" value="1" onchange="calculatePrice()" required>
                </div>
            </div>

            <div class="price-tag" id="totalPriceDisplay">
                الإجمالي المتوقع: 60 ج.م
            </div>

            <button type="submit" class="btn-submit">تأكيد الحجز واستلام التذكرة</button>
        </form>
    </div>
</div>

<script>
    function calculatePrice() {
        const prices = { egyptian: 60, foreign: 200, student: 30 };
        const type = document.getElementById('ticketType').value;
        const count = document.getElementById('ticketCount').value;
        const total = prices[type] * count;
        document.getElementById('totalPriceDisplay').innerText = `الإجمالي المتوقع: ${total} ج.م`;
    }
</script>

</body>
</html>
